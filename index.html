<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Datassist Güven Merkezi — bilgi güvenliği, veri gizliliği ve uyumluluk." />
  <!-- Deploy kontrolü için sürüm işareti (gizli). Her yayında güncelleyin. -->
  <meta name="tc-version" content="1.0.1" />
  <meta name="tc-build" content="2026-07-08" />
  <title>Datassist Güven Merkezi</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/img/datassist-icon.png" />
  <link rel="apple-touch-icon" href="assets/img/datassist-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a class="brand" href="#top" aria-label="Datassist Trust Center">
        <img class="brand-logo" src="assets/img/datassist-logo.png" alt="Datassist" />
        <span class="brand-divider" aria-hidden="true"></span>
        <span class="brand-accent" data-i18n="brand.accent"></span>
      </a>
      <nav class="main-nav" id="mainNav" aria-label="Ana menü"></nav>
      <div class="header-actions">
        <button class="lang-toggle" id="langToggle" type="button" aria-label="Change language"></button>
        <a class="btn btn-primary btn-sm" id="headerCta" href="#documents"></a>
        <button class="nav-burger" id="navBurger" type="button" aria-label="Menü" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main id="top">
    <!-- Hero -->
    <section class="hero" id="hero">
      <div class="container hero-main">
        <p class="eyebrow" id="heroEyebrow"></p>
        <h1 id="heroTitle"></h1>
        <p class="hero-sub" id="heroSub"></p>
        <div class="hero-cta" id="heroCta"></div>
        <p class="hero-updated" id="heroUpdated"></p>
      </div>
      <div class="hero-glow" aria-hidden="true"></div>
    </section>

    <!-- Uyumluluk şeridi (hero ile içeriğin sınırında, öne çıkan) -->
    <div class="compliance-strip">
      <div class="container">
        <div class="strip-card">
          <div class="strip-head">
            <span class="strip-title" id="heroCardTitle"></span>
            <span class="strip-note" id="heroCardNote"></span>
          </div>
          <div class="strip-badges" id="heroBadges"></div>
        </div>
      </div>
    </div>

    <!-- Dynamic sections injected here -->
    <div id="sections"></div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="footer-brand-row">
          <img class="footer-logo-img" src="assets/img/datassist-logo-white.png" alt="Datassist" />
          <span class="brand-accent brand-accent-light" data-i18n="brand.accent"></span>
        </span>
        <p id="footerTagline"></p>
      </div>
      <nav class="footer-links" id="footerLinks" aria-label="Alt menü"></nav>
    </div>
    <div class="container footer-bottom">
      <p id="footerCopyright"></p>
    </div>
  </footer>

  <!-- Request Document Modal -->
  <div class="modal" id="requestModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-overlay" data-close></div>
    <div class="modal-box" role="document">
      <button class="modal-close" data-close aria-label="Kapat">&times;</button>
      <h3 id="modalTitle"></h3>
      <p class="modal-doc" id="modalDoc"></p>
      <form id="requestForm" class="modal-form">
        <label><span id="lblName"></span><input type="text" name="name" required /></label>
        <label><span id="lblEmail"></span><input type="email" name="email" required /></label>
        <label><span id="lblCompany"></span><input type="text" name="company" required /></label>
        <label class="modal-consent" id="consentRow" hidden>
          <input type="checkbox" id="consentCheck" />
          <span id="consentText"></span>
        </label>
        <button type="submit" class="btn btn-primary" id="modalSubmit" disabled></button>
        <p class="modal-success" id="modalSuccess" hidden></p>
      </form>
    </div>
  </div>

  <!-- NDA Sözleşme Önizleme Modalı -->
  <div class="modal" id="agreementModal" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-overlay" data-close-agreement></div>
    <div class="modal-box modal-box-lg agreement-box" role="document">
      <div class="agreement-head">
        <h3 id="agreementTitle"></h3>
        <div class="agreement-actions">
          <a id="agreementDownload" class="doc-btn" href="#" download></a>
          <button class="modal-close agreement-close" data-close-agreement aria-label="Kapat">&times;</button>
        </div>
      </div>
      <div class="agreement-body">
        <iframe id="agreementFrame" title="agreement" src="about:blank"></iframe>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
